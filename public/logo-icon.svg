    <!-- Left arm holding phone -->
    <path d="M65 125 Q45 130 40 155 L55 155 Q60 140 75 135" fill="#000000"/>
    <!-- Right arm holding phone -->
    <path d="M135 125 Q155 130 160 155 L145 155 Q140 140 125 135" fill="#000000"/>
